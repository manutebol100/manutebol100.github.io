<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c518"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M32 4 L8 14 L8 30 C8 44.4 18.4 57.2 32 60 C45.6 57.2 56 44.4 56 30 L56 14 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <!-- Inner shield border -->
  <path d="M32 8 L12 16.5 L12 30 C12 42.5 21 53.5 32 56 C43 53.5 52 42.5 52 30 L52 16.5 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
  <!-- Gold "V" letter -->
  <polygon points="22,26 32,44 42,26" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Play triangle inside V -->
  <polygon points="35,33 35,39 40,36" fill="#0a0a0f" opacity="0.0"/>
  <!-- Play button circle at bottom-right of shield -->
  <circle cx="38" cy="42" r="7" fill="url(#goldGrad)" opacity="0.95"/>
  <polygon points="35,38 35,46 43,42" fill="#0a0a0f"/>
  <!-- Subtle decorative dots -->
  <circle cx="20" cy="20" r="1.2" fill="#f5c518" opacity="0.3"/>
  <circle cx="44" cy="20" r="1.2" fill="#f5c518" opacity="0.3"/>
  <circle cx="28" cy="50" r="0.8" fill="#d4a574" opacity="0.25"/>
  <circle cx="36" cy="51" r="0.8" fill="#d4a574" opacity="0.25"/>
  <!-- Highlight arc on shield -->
  <path d="M20 18 Q32 10 44 18" fill="none" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.35"/>
</svg>
